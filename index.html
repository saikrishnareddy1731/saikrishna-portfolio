<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#080808">
  <meta name="description" content="Sai Krishna Reddy Ragula — Software Engineer specializing in distributed systems, Java, Spring Boot, Kafka, cloud and AI engineering.">
  <title>Sai Krishna Reddy | Portfolio</title>
  <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="assets/css/styles.css?v=4">
</head>
<body class="landing-page landing-locked">
  <a class="skip-link" href="#profiles" data-skip-intro>Skip intro</a>

  <button class="enter-overlay" type="button" data-enter aria-label="Start portfolio experience with sound">
    <span class="enter-brand">SKR</span>
    <span class="enter-title">Sai Krishna Reddy</span>
    <span class="enter-prompt"><span class="enter-play" aria-hidden="true">▶</span> Click to enter</span>
    <span class="enter-audio-note">Sound on</span>
  </button>

  <div class="intro" data-intro aria-hidden="true">
    <div class="intro-mark">SKR</div>
    <div class="intro-line"></div>
    <div class="intro-glow"></div>
  </div>

  <main class="profile-gate" id="profiles" data-profile-gate aria-hidden="true">
    <a class="brand brand--large" href="browse.html" aria-label="Open Sai Krishna Reddy portfolio">
      <span>SKR</span><small>PORTFOLIO</small>
    </a>

    <section class="profile-panel" aria-labelledby="profile-title">
      <p class="eyebrow">Welcome to my engineering story</p>
      <h1 id="profile-title">Who’s exploring?</h1>
      <div class="profiles">
        <a class="profile-card" data-profile-link href="browse.html">
          <span class="profile-avatar"><img src="assets/img/profile.jpeg" alt="Sai Krishna Reddy Ragula"></span>
          <span class="profile-name">Recruiter</span>
          <span class="profile-hint">Experience & impact</span>
        </a>

        <a class="profile-card" data-profile-link href="browse.html#projects">
          <span class="profile-avatar profile-avatar--code" aria-hidden="true">&lt;/&gt;</span>
          <span class="profile-name">Engineer</span>
          <span class="profile-hint">Projects & architecture</span>
        </a>

        <a class="profile-card" data-profile-link href="about.html">
          <span class="profile-avatar profile-avatar--about" aria-hidden="true">SK</span>
          <span class="profile-name">About Me</span>
          <span class="profile-hint">Background & goals</span>
        </a>
      </div>
      <p class="profile-note">Choose a profile to enter.</p>
    </section>
  </main>

  <audio data-intro-audio preload="auto" src="assets/audio/skr-intro.mp3"></audio>
  <script src="assets/js/app.js?v=4" defer></script>
</body>
</html>
